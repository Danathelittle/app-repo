name: CI & Manifest Update

on:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Lint
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-push:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build and Push
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/automation/sample-project:$IMAGE_TAG .
        docker push $ECR_REGISTRY/automation/sample-project:$IMAGE_TAG

  update-manifest:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Manifest Repo
      uses: actions/checkout@v4
      with:
        repository: 'your-github-username/manifest-repo'
        token: ${{ secrets.PAT_TOKEN }}
    - name: Update K8s Image Tag
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        sed -i "s|image: .*|image: ${{ secrets.ECR_REGISTRY }}/automation/sample-project:${{ github.sha }}|g" k8s/deployment.yml
        git add k8s/deployment.yml
        git commit -m "image update: bump version to ${{ github.sha }}"
        git push origin main